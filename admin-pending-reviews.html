<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Pending Reviews | Hands Detail Shop</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        background: #0d1b2a;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .admin-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .admin-header {
        background: linear-gradient(135deg, #1565c0, #1e88e5);
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
        color: white;
      }

      .admin-header h1 {
        margin: 0 0 10px 0;
        font-size: 2.2rem;
      }

      .admin-header p {
        margin: 0;
        opacity: 0.9;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }

      .stat-box {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 8px;
        text-align: center;
      }

      .stat-number {
        font-size: 2rem;
        font-weight: bold;
        color: #90caf9;
      }

      .stat-label {
        font-size: 0.9rem;
        opacity: 0.9;
        margin-top: 5px;
      }

      .review-card {
        background: linear-gradient(135deg, #0d1b2a, #1a2942);
        border: 1px solid rgba(66, 165, 245, 0.3);
        border-radius: 10px;
        padding: 25px;
        margin-bottom: 20px;
      }

      .review-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 15px;
      }

      .review-info {
        flex: 1;
      }

      .customer-name {
        font-size: 1.3rem;
        color: #90caf9;
        font-weight: 600;
        margin: 0 0 5px 0;
      }

      .review-meta {
        font-size: 0.9rem;
        color: #a0a0a0;
        margin: 5px 0;
      }

      .star-rating {
        font-size: 1.2rem;
        color: #ffc107;
        margin: 5px 0;
      }

      .review-text {
        background: rgba(30, 30, 30, 0.5);
        border-left: 3px solid #42a5f5;
        padding: 15px;
        margin: 15px 0;
        border-radius: 5px;
        font-style: italic;
        line-height: 1.6;
        color: #e8f1f8;
      }

      .review-actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      .btn-approve {
        background: linear-gradient(135deg, #4caf50, #66bb6a);
        color: white;
      }

      .btn-approve:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
      }

      .btn-reject {
        background: linear-gradient(135deg, #f44336, #e53935);
        color: white;
      }

      .btn-reject:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #a0a0a0;
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 15px;
      }

      .empty-state h3 {
        color: #d4d4d4;
        margin-bottom: 10px;
      }

      .success-message {
        background: rgba(76, 175, 80, 0.15);
        border: 1px solid rgba(76, 175, 80, 0.5);
        color: #66bb6a;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .success-message.show {
        display: block;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .error-message {
        background: rgba(244, 67, 54, 0.15);
        border: 1px solid rgba(244, 67, 54, 0.5);
        color: #f44336;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .error-message.show {
        display: block;
        animation: slideIn 0.3s ease;
      }

      .footer {
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid rgba(160, 160, 160, 0.3);
        text-align: center;
        color: #707070;
        font-size: 0.9rem;
      }

      a {
        color: #64b5f6;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <div class="admin-header">
        <h1>📋 Admin Panel - Pending Reviews</h1>
        <p>Manage and approve customer reviews before they go live on your site</p>
        <div class="stats">
          <div class="stat-box">
            <div class="stat-number" id="pendingCount">0</div>
            <div class="stat-label">Pending Reviews</div>
          </div>
          <div class="stat-box">
            <div class="stat-number" id="approvedCount">0</div>
            <div class="stat-label">Approved</div>
          </div>
        </div>
      </div>

      <div class="success-message" id="successMessage"></div>
      <div class="error-message" id="errorMessage"></div>

      <div id="reviewsContainer"></div>

      <div class="footer">
        <a href="index.html">← Back to Home</a> | <a href="reviews.html">View Published Reviews</a>
      </div>
    </div>

    <script>
      // Review Management System
      const STORAGE_KEYS = {
        PENDING: 'pendingReviews',
        APPROVED: 'approvedReviews',
      };

      /**
       * Load and display all pending reviews
       */
      function loadPendingReviews() {
        const container = document.getElementById('reviewsContainer');
        const pendingReviews = JSON.parse(localStorage.getItem(STORAGE_KEYS.PENDING)) || [];
        const approvedReviews = JSON.parse(localStorage.getItem(STORAGE_KEYS.APPROVED)) || [];

        // Update counts
        document.getElementById('pendingCount').textContent = pendingReviews.length;
        document.getElementById('approvedCount').textContent = approvedReviews.length;

        // Clear container
        container.innerHTML = '';

        if (pendingReviews.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">✅</div>
              <h3>All Caught Up!</h3>
              <p>No pending reviews. All your reviews have been approved.</p>
            </div>
          `;
          return;
        }

        // Display each pending review
        pendingReviews.forEach((review, index) => {
          const reviewCard = createReviewCard(review, index);
          container.appendChild(reviewCard);
        });
      }

      /**
       * Create a review card element
       */
      function createReviewCard(review, index) {
        const card = document.createElement('div');
        card.className = 'review-card';
        card.id = `review-${index}`;

        const stars = '⭐'.repeat(review.rating);
        const submittedDate = new Date(review.createdAt).toLocaleDateString();

        card.innerHTML = `
          <div class="review-header">
            <div class="review-info">
              <p class="customer-name">${review.name}</p>
              <div class="star-rating">${stars}</div>
              <div class="review-meta">
                📧 ${review.email || 'No email provided'}
              </div>
              <div class="review-meta">
                📅 Submitted: ${submittedDate}
              </div>
            </div>
          </div>

          <div class="review-text">
            "${review.comment}"
          </div>

          <div class="review-actions">
            <button class="btn btn-approve" onclick="approveReview(${index})">
              ✓ Approve & Publish
            </button>
            <button class="btn btn-reject" onclick="rejectReview(${index})">
              ✕ Reject
            </button>
          </div>
        `;

        return card;
      }

      /**
       * Approve a review and move it to approved
       */
      function approveReview(index) {
        const pendingReviews = JSON.parse(localStorage.getItem(STORAGE_KEYS.PENDING)) || [];
        const approvedReviews = JSON.parse(localStorage.getItem(STORAGE_KEYS.APPROVED)) || [];

        if (index >= 0 && index < pendingReviews.length) {
          const review = pendingReviews[index];
          approvedReviews.push(review);
          pendingReviews.splice(index, 1);

          localStorage.setItem(STORAGE_KEYS.PENDING, JSON.stringify(pendingReviews));
          localStorage.setItem(STORAGE_KEYS.APPROVED, JSON.stringify(approvedReviews));

          showMessage(`✓ Review from ${review.name} has been approved!`, 'success');
          loadPendingReviews();
        }
      }

      /**
       * Reject a review and remove it
       */
      function rejectReview(index) {
        const pendingReviews = JSON.parse(localStorage.getItem(STORAGE_KEYS.PENDING)) || [];

        if (index >= 0 && index < pendingReviews.length) {
          const review = pendingReviews[index];
          pendingReviews.splice(index, 1);

          localStorage.setItem(STORAGE_KEYS.PENDING, JSON.stringify(pendingReviews));

          showMessage(`✕ Review from ${review.name} has been rejected and removed.`, 'error');
          loadPendingReviews();
        }
      }

      /**
       * Show success or error message
       */
      function showMessage(text, type) {
        const msgElement = document.getElementById(
          type === 'success' ? 'successMessage' : 'errorMessage'
        );
        msgElement.textContent = text;
        msgElement.classList.add('show');

        setTimeout(() => {
          msgElement.classList.remove('show');
        }, 4000);
      }

      // Load reviews on page load
      document.addEventListener('DOMContentLoaded', loadPendingReviews);
    </script>
  </body>
</html>
